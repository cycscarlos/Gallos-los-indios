<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árbol de Linaje - Gallos Los Indios</title>
    <meta name="description" content="Árbol genealógico del ejemplar. Consulta el pedigree completo: padre, madre, abuelo y abuela.">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--black-deep, #0a0a0a);
            color: var(--white, #fff);
            font-family: var(--font-body, 'Outfit', sans-serif);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── NAVBAR ───────────────────────────────── */
        .linaje-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212,175,55,0.15);
        }

        .linaje-nav a {
            display: flex; align-items: center; gap: 0.5rem;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .linaje-nav a:hover { color: #d4af37; }

        .linaje-nav-title {
            flex: 1;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: clamp(0.75rem, 2.5vw, 1.1rem);
            color: #d4af37;
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        /* ─── LOADING / ERROR ──────────────────────── */
        #linaje-loading, #linaje-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 1.5rem;
            color: rgba(255,255,255,0.4);
            font-size: 1rem;
            text-align: center;
            padding: 2rem;
        }
        #linaje-loading .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(212,175,55,0.15);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #linaje-error { color: #e74c3c; }
        #linaje-error a { color: #d4af37; text-decoration: none; font-size: 0.85rem; }

        /* ─── TREE WRAPPER ─────────────────────────── */
        #linaje-wrapper {
            display: none;
            padding-top: 80px;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        #linaje-wrapper.show { display: flex; }

        #tree-svg-container {
            width: 100%;
            overflow: visible;
        }

        /* ─── D3 TREE NODES ────────────────────────── */
        .tree-node-group { cursor: pointer; }

        .tree-node-rect {
            rx: 16; ry: 16;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
            transition: all 0.3s;
            cursor: pointer;
        }

        .tree-node-group:hover .tree-node-rect {
            filter: drop-shadow(0 4px 30px rgba(212,175,55,0.5));
        }

        .tree-node-placa {
            font-family: 'Cinzel', serif;
            fill: #d4af37;
            text-anchor: middle;
            dominant-baseline: middle;
            font-weight: 700;
            letter-spacing: 2px;
            pointer-events: none;
        }

        .tree-node-role {
            font-family: 'Outfit', sans-serif;
            fill: rgba(255,255,255,0.4);
            text-anchor: middle;
            dominant-baseline: middle;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
        }

        .tree-link {
            fill: none;
            stroke: rgba(212,175,55,0.35);
            stroke-width: 2;
            stroke-dasharray: 6 4;
        }

        /* ─── DETAIL PANEL OVERLAY ─────────────────── */
        #detail-overlay {
            position: fixed; inset: 0; z-index: 300;
            background: rgba(0,0,0,0.75);
            display: flex; align-items: center; justify-content: center;
            padding: 2rem;
            opacity: 0; visibility: hidden;
            transition: all 0.35s ease;
            backdrop-filter: blur(6px);
        }
        #detail-overlay.show { opacity: 1; visibility: visible; }

        .detail-panel {
            background: rgba(12,12,12,0.98);
            border: 1px solid rgba(212,175,55,0.4);
            border-radius: 16px;
            padding: 2rem 2rem 1.75rem;
            max-width: 440px;
            width: 100%;
            position: relative;
            transform: scale(0.9) translateY(24px);
            transition: transform 0.35s ease;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 50px rgba(212,175,55,0.08);
        }
        #detail-overlay.show .detail-panel { transform: scale(1) translateY(0); }

        .detail-panel-close {
            position: absolute; top: 1rem; right: 1rem;
            background: transparent;
            border: 1px solid rgba(212,175,55,0.3);
            color: #d4af37;
            width: 30px; height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.95rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .detail-panel-close:hover { background: #d4af37; color: #000; }

        .detail-panel-placa {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.2rem, 3vw, 1.7rem);
            color: #d4af37;
            letter-spacing: 0.1em;
            margin-bottom: 0.2rem;
        }
        .detail-panel-marca {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 1.5rem;
            letter-spacing: 0.04em;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem 1.5rem;
        }
        .detail-field { display: flex; flex-direction: column; gap: 3px; }
        .detail-field-label {
            font-size: 0.52rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.3);
        }
        .detail-field-value {
            font-size: 0.82rem;
            color: #fff;
            font-weight: 500;
        }
        .detail-field-value.gold { color: #d4af37; font-family: 'Cinzel', serif; }

        .d-estado {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .d-estado.disponible { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
        .d-estado.reservado  { background: rgba(241,196,15,0.15);  color: #f1c40f; border: 1px solid rgba(241,196,15,0.3); }
        .d-estado.vendido    { background: rgba(231,76,60,0.15);   color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }

        /* Responsive */
        @media (max-width: 600px) {
            .linaje-nav { padding: 0.85rem 1rem; }
            .detail-grid { grid-template-columns: 1fr; }
        }
        /* Tooltip de Hover */
        #hover-tooltip {
            position: absolute;
            z-index: 400;
            background: rgba(12,12,12,0.97);
            border: 1px solid rgba(212,175,55,0.35);
            border-radius: 8px;
            padding: 0.6rem 0.75rem;
            width: 190px;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.15s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        #hover-tooltip.show {
            opacity: 1;
            visibility: visible;
        }
        .tooltip-header {
            font-family: 'Cinzel', serif;
            color: var(--gold-primary);
            font-size: 0.72rem;
            margin-bottom: 0.35rem;
            border-bottom: 1px solid rgba(212,175,55,0.15);
            padding-bottom: 0.2rem;
            letter-spacing: 0.04em;
        }
        .tooltip-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
        }
        .tooltip-grid .detail-field-label { font-size: 0.46rem; }
        .tooltip-grid .detail-field-value { font-size: 0.68rem; }
        .tooltip-grid .d-estado { font-size: 0.5rem; padding: 1px 6px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="light-rays"></div>
    <div class="embers" id="embers"></div>

    <div id="hover-tooltip"></div>

    <!-- NAVBAR -->
    <nav class="linaje-nav">
        <a href="/pages/galeria.html">
            <i class="fas fa-arrow-left"></i>
            <span>Galería</span>
        </a>
        <div class="linaje-nav-title">Árbol de Linaje</div>
        <a href="/">
            <i class="fas fa-home"></i>
            <span>Inicio</span>
        </a>
    </nav>

    <!-- LOADING -->
    <div id="linaje-loading">
        <div class="spinner"></div>
        <span>Cargando árbol genealógico...</span>
    </div>

    <!-- ERROR -->
    <div id="linaje-error" style="display:none;">
        <i class="fas fa-exclamation-triangle" style="font-size:2.5rem;"></i>
        <span id="linaje-error-msg">Ejemplar no encontrado.</span>
        <a href="/pages/galeria.html">← Volver a la Galería</a>
    </div>

    <!-- TREE CONTAINER -->
    <div id="linaje-wrapper">
        <div id="tree-svg-container"></div>
    </div>

    <!-- DETAIL PANEL -->
    <div id="detail-overlay">
        <div class="detail-panel">
            <button class="detail-panel-close" id="detail-close">&times;</button>
            <div id="detail-content"></div>
        </div>
    </div>

    <button class="sound-toggle" id="soundToggle">AUDIO</button>

    <script type="module" src="/src/pages/linaje.js"></script>
</body>
</html>
