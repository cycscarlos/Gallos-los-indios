<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplares - Gallos Los Indios</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>
    <div class="light-rays"></div>
    <div class="embers" id="embers"></div>

    <div class="admin-wrapper" id="adminContent" style="display: none;">
        <div class="admin-container">
            <header class="admin-header">
                <h1 class="admin-title">GESTIÓN DE EJEMPLARES</h1>
                <div class="admin-user">
                    <div class="admin-user-info">
                        <div class="admin-user-name" id="userName">Cargando...</div>
                        <div class="admin-user-role" id="userRole"></div>
                    </div>
                    <button class="btn-logout" id="btnLogout">CERRAR SESIÓN</button>
                </div>
            </header>

            <nav class="admin-nav">
                <a href="/pages/admin/dashboard.html" class="admin-nav-link">Dashboard</a>
                <a href="/pages/admin/ejemplares.html" class="admin-nav-link active">Ejemplares</a>
                <a href="/pages/admin/consultas.html" class="admin-nav-link">Consultas</a>
                <a href="/pages/admin/usuarios.html" class="admin-nav-link" id="navUsuarios">Usuarios</a>
            </nav>

            <div class="admin-section">
                <div class="section-header">
                    <h2 class="section-title">Catálogo de Ejemplares</h2>
                    <button class="btn-primary" id="btnNuevo">+ NUEVO EJEMPLAR</button>
                </div>
                <div id="ejemplaresList">
                    <div class="loading">Cargando ejemplares...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="not-authorized" id="notAuthorized" style="display: none;">
        <h2>ACCESO NO AUTORIZADO</h2>
        <p>Debes iniciar sesión para acceder a este panel.</p>
        <a href="/pages/login.html" class="btn-primary">IR A LOGIN</a>
    </div>

    <div class="modal" id="modalEjemplar">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nuevo Ejemplar</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="formEjemplar">
                <input type="hidden" id="ejemplarId">
                <div class="form-grid">
                    <div class="form-field">
                        <label for="nombre">Nombre *</label>
                        <input type="text" id="nombre" required>
                    </div>
                    <div class="form-field">
                        <label for="categoria">Categoría *</label>
                        <select id="categoria" required>
                            <option value="">Seleccionar...</option>
                            <option value="Pelea">Pelea</option>
                            <option value="Reproducción">Reproducción</option>
                            <option value="Exhibición">Exhibición</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label for="tipo">Tipo</label>
                        <input type="text" id="tipo" placeholder="Ej: Gallo Americano">
                    </div>
                    <div class="form-field">
                        <label for="peso">Peso (kg)</label>
                        <input type="number" id="peso" step="0.01" min="0">
                    </div>
                    <div class="form-field">
                        <label for="edad">Edad (años)</label>
                        <input type="number" id="edad" min="0">
                    </div>
                    <div class="form-field">
                        <label for="estado">Estado</label>
                        <select id="estado">
                            <option value="disponible">Disponible</option>
                            <option value="reservado">Reservado</option>
                            <option value="vendido">Vendido</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label for="precio">Precio</label>
                        <input type="text" id="precio" placeholder="Ej: $150 o CONSULTAR">
                    </div>
                    <div class="form-field">
                        <label for="destacado">Destacado</label>
                        <select id="destacado">
                            <option value="false">No</option>
                            <option value="true">Sí</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label for="orden">Orden</label>
                        <input type="number" id="orden" min="0" value="0">
                    </div>
                    <div class="form-field full-width">
                        <label for="imagen_url">URL de Imagen</label>
                        <input type="url" id="imagen_url" placeholder="https://...">
                    </div>
                    <div class="form-field full-width">
                        <label for="pedigree_resumido">Pedigree Resumido</label>
                        <input type="text" id="pedigree_resumido" placeholder="Línea de sangre breve">
                    </div>
                    <div class="form-field full-width">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion"></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn-primary" id="btnGuardar">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <button class="sound-toggle" id="soundToggle">AUDIO</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="/src/admin/ejemplares.js"></script>
</body>
</html>
