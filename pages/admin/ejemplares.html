<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplares - Gallos Los Indios</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="canvas-container"></div>
    <div class="light-rays"></div>
    <div class="embers" id="embers"></div>

    <div class="admin-wrapper" id="adminContent" style="display: none;">
        <!-- Sidebar Izquierda -->
        <aside class="admin-sidebar">
            <div class="sidebar-logo">
                <a href="/">
                    <img src="/images/logo2.png" alt="Gallos Indios" class="sidebar-logo-img">
                    <span>GALLOS INDIOS</span>
                </a>
            </div>
            <nav class="admin-nav">
                <a href="/pages/admin/dashboard.html" class="admin-nav-link">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <div class="nav-group">
                    <div class="nav-group-title">CATÁLOGO</div>
                    <a href="/pages/admin/ejemplares.html" class="admin-nav-link active">
                        <i class="fas fa-feather-pointed"></i>
                        <span>Ejemplares</span>
                    </a>
                </div>
                <div class="nav-group">
                    <div class="nav-group-title">GESTIÓN</div>
                    <a href="/pages/admin/consultas.html" class="admin-nav-link">
                        <i class="fas fa-comment-dots"></i>
                        <span>Consultas</span>
                    </a>
                    <a href="/pages/admin/usuarios.html" class="admin-nav-link" id="navUsuarios">
                        <i class="fas fa-user-shield"></i>
                        <span>Usuarios</span>
                    </a>
                </div>
            </nav>
            <div class="sidebar-logout">
                <a href="/" class="btn-logout" style="margin-bottom: 10px; text-decoration: none; color: var(--white); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                    <i class="fas fa-arrow-left"></i>
                    <span>Volver al Sitio</span>
                </a>
                <button class="btn-logout" id="btnLogout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <!-- Contenedor Principal Derecha -->
        <div class="admin-container">
            <!-- Topbar -->
            <header class="admin-topbar">
                <div class="admin-topbar-left">
                    <div class="admin-breadcrumbs">
                        <a href="/pages/admin/dashboard.html">Admin</a>
                        <span class="separator">/</span>
                        <span class="current">Ejemplares</span>
                    </div>
                    <div class="admin-page-title">GESTIÓN DE EJEMPLARES</div>
                </div>
                <div class="admin-user">
                    <div class="admin-user-info">
                        <div class="admin-user-details">
                            <div class="admin-user-name" id="userName">Cargando...</div>
                            <div class="admin-user-role" id="userRole"></div>
                        </div>
                        <div class="user-avatar">
                            <img src="https://ui-avatars.com/api/?name=Admin&background=d4af37&color=000" alt="Avatar" id="userAvatar">
                        </div>
                    </div>
                </div>
            </header>

            <!-- Sección de Contenido -->
            <div class="admin-section">
                <div class="section-header">
                    <h2 class="section-title">Catálogo de Ejemplares</h2>
                    <button class="btn-primary" id="btnNuevo">+ NUEVO EJEMPLAR</button>
                </div>
                <div id="ejemplaresList">
                    <div class="loading">Cargando ejemplares...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="not-authorized" id="notAuthorized" style="display: none;">
        <h2>ACCESO NO AUTORIZADO</h2>
        <p>Debes iniciar sesión para acceder a este panel.</p>
        <a href="/pages/login.html" class="btn-primary">IR A LOGIN</a>
    </div>

    <div class="modal" id="modalEjemplar" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nuevo Ejemplar</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="formEjemplar">
                <input type="hidden" id="ejemplarId">
                <div class="form-grid">
                    <div class="form-field">
                        <label for="placa_id">Placa ID *</label>
                        <input type="text" id="placa_id" required placeholder="Ej: G-001">
                    </div>
                    <div class="form-field">
                        <label for="marca">Marca *</label>
                        <input type="text" id="marca" required>
                    </div>
                    <div class="form-field">
                        <label for="genero">Género *</label>
                        <select id="genero" required>
                            <option value="">Seleccionar...</option>
                            <option value="Macho">Macho</option>
                            <option value="Hembra">Hembra</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label for="linea">Línea (Genética)</label>
                        <input type="text" id="linea" placeholder="Ej: Hatch / Kelso">
                    </div>
                    <div class="form-field">
                        <label for="precio">Precio</label>
                        <input type="text" id="precio" placeholder="Ej: $150 o CONSULTAR">
                    </div>
                    <div class="form-field">
                        <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                        <input type="date" id="fecha_nacimiento">
                    </div>
                    <div class="form-field">
                        <label for="padre_id">ID del Padre (UUID)</label>
                        <input type="text" id="padre_id" placeholder="Opcional">
                    </div>
                    <div class="form-field">
                        <label for="madre_id">ID de la Madre (Placa)</label>
                        <input type="text" id="madre_id" placeholder="Opcional — Placa ID">
                    </div>
                    <div class="form-field">
                        <label for="abuelo_paterno_id">ID Abuelo Paterno (Placa)</label>
                        <input type="text" id="abuelo_paterno_id" placeholder="Opcional — Placa ID">
                    </div>
                    <div class="form-field">
                        <label for="abuela_paterna_id">ID Abuela Paterna (Placa)</label>
                        <input type="text" id="abuela_paterna_id" placeholder="Opcional — Placa ID">
                    </div>
                    <div class="form-field">
                        <label for="abuelo_materno_id">ID Abuelo Materno (Placa)</label>
                        <input type="text" id="abuelo_materno_id" placeholder="Opcional — Placa ID">
                    </div>
                    <div class="form-field">
                        <label for="abuela_materna_id">ID Abuela Materna (Placa)</label>
                        <input type="text" id="abuela_materna_id" placeholder="Opcional — Placa ID">
                    </div>
                    <div class="form-field">
                        <label for="estado">Estado</label>
                        <select id="estado">
                            <option value="disponible">Disponible</option>
                            <option value="reservado">Reservado</option>
                            <option value="vendido">Vendido</option>
                        </select>
                    </div>
                    <div class="form-field full-width">
                        <label for="imagen_url">URL de Imagen</label>
                        <input type="url" id="imagen_url" placeholder="https://...">
                    </div>
                    <div class="form-field full-width">
                        <label for="observaciones">Observaciones</label>
                        <textarea id="observaciones" placeholder="Detalles de este ejemplar..."></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn-primary" id="btnGuardar">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <button class="sound-toggle" id="soundToggle">AUDIO</button>

    <script type="module" src="/src/admin/ejemplares.js"></script>
</body>
</html>
