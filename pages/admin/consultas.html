<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas - Gallos Los Indios</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="canvas-container"></div>
    <div class="light-rays"></div>
    <div class="embers" id="embers"></div>

    <div class="admin-wrapper" id="adminContent" style="display: none;">
        <!-- Sidebar Izquierda -->
        <aside class="admin-sidebar">
            <div class="sidebar-logo">
                <a href="/">
                    <img src="/images/logo2.png" alt="Gallos Indios" class="sidebar-logo-img">
                    <span>GALLOS INDIOS</span>
                </a>
            </div>
            <nav class="admin-nav">
                <a href="/pages/admin/dashboard.html" class="admin-nav-link">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>

                <div class="nav-group">
                    <div class="nav-group-title">CATÁLOGO</div>
                    <a href="/pages/admin/ejemplares.html" class="admin-nav-link">
                        <i class="fas fa-feather-pointed"></i>
                        <span>Ejemplares</span>
                    </a>
                </div>

                <div class="nav-group">
                    <div class="nav-group-title">GESTIÓN</div>
                    <a href="/pages/admin/consultas.html" class="admin-nav-link active">
                        <i class="fas fa-comment-dots"></i>
                        <span>Consultas</span>
                    </a>
                    <a href="/pages/admin/usuarios.html" class="admin-nav-link" id="navUsuarios">
                        <i class="fas fa-user-shield"></i>
                        <span>Usuarios</span>
                    </a>
                </div>

                <div style="margin-top: auto; padding-top: 2rem;">
                    <button class="btn-logout" id="btnLogout" style="width: 100%;">CERRAR SESIÓN</button>
                </div>
            </nav>
        </aside>

        <!-- Contenedor Principal Derecha -->
        <div class="admin-container">
            <!-- Topbar Nueva -->
            <header class="admin-topbar">
                <div class="admin-page-title">CONSULTAS Y MENSAJES</div>
                <div class="admin-user">
                    <div class="admin-user-info">
                        <div class="admin-user-details">
                            <div class="admin-user-name" id="userName">Cargando...</div>
                            <div class="admin-user-role" id="userRole"></div>
                        </div>
                        <div class="user-avatar">
                            <img src="https://ui-avatars.com/api/?name=Admin&background=d4af37&color=000" alt="Avatar" id="userAvatar">
                        </div>
                    </div>
                </div>
            </header>

            <!-- Sección de Contenido -->
            <div class="admin-section">
                <div class="section-header">
                    <h2 class="section-title">Todas las Consultas</h2>
                    <div class="filter-buttons">
                        <button class="btn-secondary active" data-filter="all">Todas</button>
                        <button class="btn-secondary" data-filter="no-leido">Sin Leer</button>
                        <button class="btn-secondary" data-filter="pendiente">Pendientes</button>
                    </div>
                </div>
                <div id="consultasList">
                    <div class="loading">Cargando consultas...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="not-authorized" id="notAuthorized" style="display: none;">
        <h2>ACCESO NO AUTORIZADO</h2>
        <p>Debes iniciar sesión para acceder a este panel.</p>
        <a href="/pages/login.html" class="btn-primary">IR A LOGIN</a>
    </div>

    <div class="modal" id="modalConsulta">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Detalle de Consulta</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div id="consultaDetalle">
                <div class="loading">Cargando...</div>
            </div>
        </div>
    </div>

    <button class="sound-toggle" id="soundToggle">AUDIO</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="/src/admin/consultas.js"></script>
</body>
</html>
