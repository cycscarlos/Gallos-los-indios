<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Gallos Los Indios</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="canvas-container"></div>
    <div class="light-rays"></div>
    <div class="embers" id="embers"></div>

    <div class="admin-wrapper" id="adminContent" style="display: none;">
        <!-- Sidebar Izquierda -->
        <aside class="admin-sidebar">
            <div class="sidebar-logo">
                <a href="/">
                    <img src="/images/logo2.png" alt="Gallos Indios" class="sidebar-logo-img">
                    <span>GALLOS INDIOS</span>
                </a>
            </div>
            <nav class="admin-nav">
                <a href="/pages/admin/dashboard.html" class="admin-nav-link">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <div class="nav-group">
                    <div class="nav-group-title">CATÁLOGO</div>
                    <a href="/pages/admin/ejemplares.html" class="admin-nav-link">
                        <i class="fas fa-feather-pointed"></i>
                        <span>Ejemplares</span>
                    </a>
                </div>
                <div class="nav-group">
                    <div class="nav-group-title">GESTIÓN</div>
                    <a href="/pages/admin/consultas.html" class="admin-nav-link">
                        <i class="fas fa-comment-dots"></i>
                        <span>Consultas</span>
                    </a>
                    <a href="/pages/admin/usuarios.html" class="admin-nav-link active" id="navUsuarios">
                        <i class="fas fa-user-shield"></i>
                        <span>Usuarios</span>
                    </a>
                </div>
            </nav>
            <div class="sidebar-logout">
                <a href="/" class="btn-logout" style="margin-bottom: 10px; text-decoration: none; color: var(--white); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                    <i class="fas fa-arrow-left"></i>
                    <span>Volver al Sitio</span>
                </a>
                <button class="btn-logout" id="btnLogout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <!-- Contenedor Principal Derecha -->
        <div class="admin-container">
            <!-- Topbar -->
            <header class="admin-topbar">
                <div class="admin-topbar-left">
                    <div class="admin-breadcrumbs">
                        <a href="/pages/admin/dashboard.html">Admin</a>
                        <span class="separator">/</span>
                        <span class="current">Usuarios</span>
                    </div>
                    <div class="admin-page-title">GESTIÓN DE USUARIOS</div>
                </div>
                <div class="admin-user">
                    <div class="admin-user-info">
                        <div class="admin-user-details">
                            <div class="admin-user-name" id="userName">Cargando...</div>
                            <div class="admin-user-role" id="userRole"></div>
                        </div>
                        <div class="user-avatar">
                            <img src="https://ui-avatars.com/api/?name=Admin&background=d4af37&color=000" alt="Avatar" id="userAvatar">
                        </div>
                    </div>
                </div>
            </header>

            <!-- Sección de Contenido -->
            <div class="admin-section">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 class="section-title">Usuarios del Sistema</h2>
                    <button class="btn-primary" id="btnNuevoUsuario" onclick="window.openNuevoUsuarioModal && window.openNuevoUsuarioModal()">
                        <i class="fas fa-plus"></i> NUEVO USUARIO
                    </button>
                </div>
                <div id="usuariosList">
                    <div class="loading">Cargando usuarios...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="not-authorized" id="notAuthorized" style="display: none;">
        <h2>ACCESO NO AUTORIZADO</h2>
        <p>Solo los administradores pueden acceder a esta sección.</p>
        <a href="/pages/admin/dashboard.html" class="btn-primary">IR A DASHBOARD</a>
    </div>

    <div class="modal" id="modalUsuario">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalUsuarioTitle">Editar Usuario</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="formUsuario">
                <input type="hidden" id="usuarioId">
                <div class="form-grid">
                    <div class="form-field full-width">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-field full-width" id="passwordContainer" style="display: none;">
                        <label for="password">Contraseña temporal</label>
                        <input type="password" id="password">
                    </div>
                    <div class="form-field full-width">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" required>
                    </div>
                    <div class="form-field">
                        <label for="rol">Rol</label>
                        <select id="rol">
                            <option value="soporte">Soporte</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label for="activo">Estado</label>
                        <select id="activo">
                            <option value="true">Activo</option>
                            <option value="false">Inactivo</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="btn-primary" id="btnGuardar">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <button class="sound-toggle" id="soundToggle">AUDIO</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="/src/admin/usuarios.js"></script>
</body>
</html>
