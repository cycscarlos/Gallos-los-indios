<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Gallos Los Indios</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="canvas-container"></div>
    <div class="light-rays"></div>
    <div class="embers" id="embers"></div>

    <div class="login-container">
      <div class="login-box">
        <div class="login-header">
          <h1 class="login-title">GALLOS LOS INDIOS</h1>
          <p class="login-subtitle">Panel de Administración</p>
        </div>

        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              placeholder="tu@email.com"
            />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              placeholder="Tu contraseña"
            />
          </div>

          <div class="form-error" id="formError"></div>

          <button type="submit" class="btn-login" id="btnLogin">
            <span class="btn-text">INGRESAR</span>
            <span class="btn-loader" style="display: none"></span>
          </button>
        </form>

        <div class="login-footer">
          <a href="/" class="back-link">← Volver al sitio</a>
        </div>
      </div>
    </div>

    <button class="sound-toggle" id="soundToggle">AUDIO</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="/src/pages/login.js"></script>
  </body>
</html>
