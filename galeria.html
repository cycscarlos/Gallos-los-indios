<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Gallos - Gallos Los Indios</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/galeria.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="light-rays"></div>
    <div class="embers" id="embers"></div>
    
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">GALLOS LOS INDIOS</a>
        <ul class="navbar-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="instalaciones.html">Instalaciones</a></li>
            <li><a href="servicios.html">Servicios</a></li>
            <li><a href="galeria.html" class="active">Galería</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
        <div class="navbar-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>
    
    <div class="page-wrapper">
        <header class="page-header">
            <h1 class="page-title">GALERÍA</h1>
            <p class="page-subtitle">Ejemplares disponibles - Toca para ver pedigree</p>
        </header>
        
        <div class="page-content gallery-container">
            <!-- Filters -->
            <div class="gallery-filters">
                <button class="filter-btn active" data-filter="all">Todos</button>
                <button class="filter-btn" data-filter="indio">Indio</button>
                <button class="filter-btn" data-filter="americano">Americano</button>
                <button class="filter-btn" data-filter="espanol">Español</button>
            </div>
            
            <!-- Gallery Grid -->
            <div class="gallery-grid" id="galleryGrid">
                <!-- Generated by JS -->
            </div>
            
            <!-- Pagination -->
            <div class="gallery-pagination" id="galleryPagination">
                <!-- Generated by JS -->
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-content" id="modalContent">
                <!-- Generated by JS -->
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="footer-info">© 2024 Gallos Los Indios. Todos los derechos reservados.</div>
        <a href="mailto:info@galloslosindios.com" class="footer-contact">info@galloslosindios.com</a>
    </footer>
    
    <button class="sound-toggle" id="soundToggle">AUDIO</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/gallery.js"></script>
</body>
</html>
